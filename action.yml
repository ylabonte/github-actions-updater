name: github-actions-updater
description: Scan .github/workflows for outdated remote action references; optionally apply updates and produce a non-interactive commit.
author: Yannic Labonte

branding:
  icon: refresh-cw
  color: blue

inputs:
  version:
    # Pinned to the action's own major so that `uses: ylabonte/github-actions-updater@v1`
    # cannot silently start running a future `2.x` CLI once that ships to npm. When we
    # publish a major bump of the CLI, the matching action major (e.g. `v2` of this
    # repo) updates this default to `2`. Callers who want to pin tighter (e.g.
    # `1.2.3` for reproducible builds, `latest` to opt into floating across majors)
    # can override the input explicitly.
    description: 'npm tag or version of github-actions-updater to run via `npx`. Defaults to `1`, matching the action major; override to pin tighter or to float across majors.'
    required: false
    default: '1'
  target:
    description: 'Update target policy: latest, major, minor, patch, greatest.'
    required: false
    default: latest
  filter:
    description: 'Space-separated globs of action names to include (e.g. "actions/*").'
    required: false
    default: ''
  reject:
    description: 'Space-separated globs of action names to exclude (e.g. "docker://**").'
    required: false
    default: ''
  workflows:
    description: 'Override the .github/workflows directory.'
    required: false
    default: ''
  write:
    description: 'Apply updates to workflow files (--write).'
    required: false
    default: 'false'
  commit:
    description: 'After --write, stage the changes and produce a non-interactive commit. Implies --no-edit.'
    required: false
    default: 'false'
  allow-branch-pin:
    description: 'On --write, convert branch refs to pinned SHAs.'
    required: false
    default: 'false'
  fail-on-outdated:
    description: 'Exit non-zero when outdated entries are found.'
    required: false
    default: 'false'
  github-token:
    description: 'Token used for GitHub API auth. Defaults to the workflow-provided `github.token` when left empty.'
    required: false
    default: ''

outputs:
  outdated:
    description: 'Number of outdated references found.'
    value: ${{ steps.run.outputs.outdated }}
    # See the script below for the two-path derivation:
    #   commit: true  → diff HEAD_BEFORE..HEAD_AFTER (the commit just landed)
    #   write only    → diff against the index (rewrites still in the working tree)
  changes:
    description: 'Number of workflow files actually rewritten by this run (counted from the just-created commit when `commit: true`, otherwise from the working tree). Always `0` when `write: false` or outside a git repository.'
    value: ${{ steps.run.outputs.changes }}
  json:
    description: 'Path to the JSON report file the action produced.'
    value: ${{ steps.run.outputs.json }}

runs:
  using: composite
  steps:
    - id: run
      shell: bash
      env:
        # Empty input falls back to the workflow's auto-provided token. Defaults to
        # `github.token` (never to `secrets.GITHUB_TOKEN` directly — that's not
        # available in composite-action expressions). Caller can still supply a PAT.
        GITHUB_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        GHAU_VERSION: ${{ inputs.version }}
        GHAU_TARGET: ${{ inputs.target }}
        GHAU_FILTER: ${{ inputs.filter }}
        GHAU_REJECT: ${{ inputs.reject }}
        GHAU_WORKFLOWS: ${{ inputs.workflows }}
        GHAU_WRITE: ${{ inputs.write }}
        GHAU_COMMIT: ${{ inputs.commit }}
        GHAU_ALLOW_BRANCH_PIN: ${{ inputs.allow-branch-pin }}
        GHAU_FAIL_ON_OUTDATED: ${{ inputs.fail-on-outdated }}
      run: |
        set -euo pipefail

        # Validate `version` against a tight allowlist BEFORE it ever reaches `npx`.
        # The package spec `github-actions-updater@<version>` is parsed by npm, and
        # npm accepts more than just semver/dist-tags here — tarball URLs
        # (`https://...tgz`), git URLs (`git+https://...`), file paths
        # (`file:./local`), and alias syntax (`npm:other-pkg@...`) all resolve to
        # arbitrary code that overrides the package name. If a caller ever wires
        # this input from attacker-controllable data (issue body, PR title, etc.),
        # the action would happily execute that code. The allowlist below permits
        # the legitimate forms (dist-tag like `latest`, exact `1.2.3`, partial
        # `1.2`, prerelease `1.2.3-rc.1`, build-meta `1.2.3+sha.abc`) and refuses
        # anything else.
        if [[ ! "$GHAU_VERSION" =~ ^[A-Za-z0-9][A-Za-z0-9._+-]*$ ]]; then
          echo "::error::Invalid 'version' input '${GHAU_VERSION}'. Expected a dist-tag (e.g. 'latest', '1') or a semver (e.g. '1.2.3', '1.2.3-rc.1'); refusing to pass it to npx."
          exit 1
        fi

        # Inputs reach the script through env vars set above (GHAU_*), never inline via
        # the template expression syntax, so action-name globs and similar attacker-
        # controllable values can't be shell-parsed. Each value is then pushed onto an
        # args array so npx receives them as separate argv entries — no shell re-parsing.
        args=(--json --target "$GHAU_TARGET")

        # `read -r -a` word-splits on IFS without invoking pathname expansion. An
        # earlier `extra=($GHAU_FILTER)` would have let `actions/*` glob against the
        # workspace before reaching ghau — bad both for correctness (the runner's
        # filesystem decides what gets filtered) and for trust (attacker-controlled
        # input glob-expanded in a privileged context). Same for reject.
        if [[ -n "$GHAU_FILTER" ]]; then
          read -r -a extra <<<"$GHAU_FILTER"
          args+=(--filter "${extra[@]}")
        fi
        if [[ -n "$GHAU_REJECT" ]]; then
          read -r -a extra <<<"$GHAU_REJECT"
          args+=(--reject "${extra[@]}")
        fi

        [[ -n "$GHAU_WORKFLOWS"           ]] && args+=(--workflows "$GHAU_WORKFLOWS")
        [[ "$GHAU_WRITE"            == "true" ]] && args+=(--write)
        [[ "$GHAU_COMMIT"           == "true" ]] && args+=(--commit --no-edit)
        [[ "$GHAU_ALLOW_BRANCH_PIN" == "true" ]] && args+=(--allow-branch-pin)
        [[ "$GHAU_FAIL_ON_OUTDATED" == "true" ]] && args+=(--fail-on-outdated)

        # Capture HEAD before running so we can tell afterward whether --commit
        # landed a commit. Empty when not in a git repo or on an unborn branch;
        # handled in both `changes` branches below.
        head_before=""
        if git rev-parse --git-dir >/dev/null 2>&1; then
          head_before=$(git rev-parse HEAD 2>/dev/null || true)
        fi

        # Unique per-invocation report path. If the action is used multiple times in
        # one job (the monorepo recipe in docs/guide/use-as-action.md does exactly
        # this), a fixed name like `$RUNNER_TEMP/ghau.json` would have later runs
        # overwrite earlier ones and both steps' `json` outputs would point at the
        # same file. `mktemp` gives us a collision-free name without depending on
        # context-specific suffixes.
        report=$(mktemp "$RUNNER_TEMP/ghau.XXXXXXXX.json")

        # Run the CLI under suspended `errexit` so a non-zero exit (notably
        # `--fail-on-outdated`, or a partial-resolution exit 1) does NOT kill the
        # script before we've written outputs. Downstream steps need access to
        # `json`/`outdated`/`changes` even when the action itself ends up failing,
        # e.g. to post a drift comment alongside a red check. We replay the
        # captured exit code at the end of the script.
        set +e
        npx -y "github-actions-updater@$GHAU_VERSION" "${args[@]}" | tee "$report"
        cli_exit=${PIPESTATUS[0]}
        set -e

        # `changes` = number of workflow files actually rewritten by this run.
        # Two derivation paths depending on what happened:
        #   - `--commit` landed a commit: the working tree is clean again, but HEAD
        #     advanced; diff HEAD_BEFORE..HEAD gives the file set in the new commit.
        #   - `--write` without `--commit`: rewrites sit in the working tree; diff
        #     against the index gives them.
        # Outside a git repo (or `write=false`), nothing to count → 0.
        changes=0
        if [[ "$GHAU_WRITE" == "true" ]] && git rev-parse --git-dir >/dev/null 2>&1; then
          head_after=$(git rev-parse HEAD 2>/dev/null || true)
          if [[ -z "$head_before" && -n "$head_after" ]]; then
            # Unborn branch case: `--commit` just produced the very first commit,
            # so HEAD advanced from "nothing" to a root commit. `git diff
            # <empty>..<sha>` won't work; `git diff-tree --root` diffs the root
            # commit against the empty tree and lists every path it introduced.
            changes=$(git diff-tree --root --no-commit-id --name-only -r "$head_after" -- '*.yml' '*.yaml' | wc -l | tr -d ' ')
          elif [[ -n "$head_before" && -n "$head_after" && "$head_before" != "$head_after" ]]; then
            changes=$(git diff --name-only "$head_before" "$head_after" -- '*.yml' '*.yaml' | wc -l | tr -d ' ')
          else
            changes=$(git diff --name-only -- '*.yml' '*.yaml' | wc -l | tr -d ' ')
          fi
        fi

        # `jq` itself fails (and, under `set -e`, would abort the script before the
        # final `exit "$cli_exit"`) if the report is empty or unparseable — which
        # is exactly what happens when the CLI crashed before writing JSON. The
        # `2>/dev/null || echo 0` swallows that failure so the output is always a
        # usable integer and downstream `if:` numeric comparisons stay valid.
        # `// 0` inside the filter then handles the case where the JSON parsed
        # but the field is missing.
        outdated=$(jq '.summary.outdated // 0' "$report" 2>/dev/null || echo 0)
        echo "json=$report"          >> "$GITHUB_OUTPUT"
        echo "outdated=$outdated"    >> "$GITHUB_OUTPUT"
        echo "changes=$changes"                                   >> "$GITHUB_OUTPUT"

        exit "$cli_exit"
